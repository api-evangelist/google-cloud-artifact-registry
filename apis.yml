aid: google-cloud-artifact-registry
name: Google Cloud Artifact Registry
description: >-
  Google Cloud Artifact Registry is a centralized repository for storing and
  managing container images, language packages, and build dependencies. It
  supports Docker, Maven, npm, Python, Go, Helm, and OS packages with
  integrated vulnerability scanning, IAM-based access control, and VPC Service
  Controls for supply chain security.
