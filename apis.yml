apis:
  - name: Google Cloud Artifact Registry API
    description: >-
      The Artifact Registry API provides programmatic access to create and
      manage repositories, upload and download artifacts, manage packages and
      versions, and configure IAM policies for artifact storage across multiple
      formats including Docker images, language packages, and OS packages.
